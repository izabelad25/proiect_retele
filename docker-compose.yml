version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: sticker_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: ./server
    container_name: sticker_server
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9000
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
